<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>編み物ゲージ方眼紙メーカー</title>
    <meta
      name="description"
      content="編み物のゲージ(目数・段数)を入力すると、実寸のゲージ方眼紙を作成してPDFでダウンロードできるツールです。"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>編み物ゲージ方眼紙メーカー</h1>
      <p>ゲージを入力すると、1マスが実寸の1目×1段になる製図用の方眼紙を作成できます。</p>
    </header>

    <main class="app-main">
      <form id="gauge-form" class="controls" autocomplete="off">
        <fieldset>
          <legend>ゲージ</legend>
          <div class="field-row">
            <label class="radio">
              <input type="radio" name="unit" value="per10cm" checked />
              10cmあたり
            </label>
            <label class="radio">
              <input type="radio" name="unit" value="per1cm" />
              1cmあたり
            </label>
          </div>
          <div class="field-row">
            <label>
              目数(横)
              <input type="number" id="stitches" value="20" min="0.5" max="200" step="0.1" required />
            </label>
            <label>
              段数(縦)
              <input type="number" id="rows" value="28" min="0.5" max="200" step="0.1" required />
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>用紙・線</legend>
          <div class="field-row">
            <label>
              用紙の向き (A4)
              <select id="orientation">
                <option value="portrait" selected>縦</option>
                <option value="landscape">横</option>
              </select>
            </label>
            <label>
              太線の間隔
              <select id="bold-every">
                <option value="5">5マスごと</option>
                <option value="10" selected>10マスごと</option>
                <option value="0">なし</option>
              </select>
            </label>
          </div>
        </fieldset>

        <div class="actions">
          <button type="button" id="download-pdf" class="primary">PDFをダウンロード</button>
        </div>
        <p class="note">PDFは実寸で出力されます。印刷時は「実際のサイズ」(拡大縮小なし)を選んでください。</p>
      </form>

      <section class="preview-pane">
        <p id="grid-info" class="grid-info"></p>
        <canvas id="preview" aria-label="ゲージ方眼紙のプレビュー"></canvas>
      </section>
    </main>

    <footer class="app-footer">
      <a href="https://github.com/mihohoi0322/knit_gauge" target="_blank" rel="noopener">GitHub</a>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
